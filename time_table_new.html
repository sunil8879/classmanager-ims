<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Time Table Generator</title>

    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        color: #000000; /* Black font on the whole page */
    }

    body {
        background-color: #ffffff; /* Total white background */
        padding-bottom: 60px;
    }

    /* --- TITLE: 3D BOX, AQUAMARINE GRADIENT, TILTED --- */
    header {
        text-align: center;
        padding: 50px 20px 40px;
        perspective: 1000px;
    }

    header h1 {
        display: inline-block;
        font-size: 0; /* Hides original HTML text to replace it */
        background: linear-gradient(135deg, #7FFFD4, #20B2AA); /* Gradient aquamarine */
        border: 4px solid #000;
        padding: 20px 40px;
        border-radius: 15px;
        /* 3D tilt effect */
        transform: rotateZ(-2deg) rotateX(15deg) rotateY(-5deg);
        box-shadow: 10px 10px 0px #000, 15px 15px 25px rgba(0,0,0,0.2);
        transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    header h1:hover {
        transform: rotateZ(0deg) rotateX(5deg) scale(1.05); /* Lifts up on hover */
        box-shadow: 15px 15px 0px #000, 20px 20px 30px rgba(0,0,0,0.3);
    }

    header h1::before {
        content: "TIME-TABLE GENERATOR - AUTO";
        font-size: 2.5rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #000000;
    }

    /* --- TOP PORTION: FORM & EQUAL SIZED BOXES --- */
    .form-container {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto 40px;
        border: 3px solid #000;
        padding: 35px;
        border-radius: 16px;
        background-color: #ffffff;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        transition: transform 0.3s;
    }

    .form-container:hover {
        transform: translateY(-5px); /* Lift effect */
        box-shadow: 0 15px 30px rgba(0,0,0,0.12);
    }

    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 25px;
        margin-bottom: 30px;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .input-group label {
        font-weight: 800;
        font-size: 0.95rem;
        text-transform: uppercase;
    }

    /* Equal Sized Inputs & Selects */
    input, select {
        height: 55px; /* Ensures all boxes are exactly the same height */
        padding: 10px 15px;
        border: 2px solid #000;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        background: #ffffff;
        transition: transform 0.3s, box-shadow 0.3s;
    }

    input:focus, select:focus {
        outline: none;
        border-color: #20B2AA;
        box-shadow: 0 0 0 3px rgba(127, 255, 212, 0.4);
    }

    input:hover:not(), select:hover {
        transform: translateY(-4px); /* Lift effect */
        box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    }

    /* Teal Color for Greyed-out (Readonly) Fields */
input[readonly] {
    background: linear-gradient(135deg, #008080, #40E0D0); /* Gradient Teal */
    color: #000; /* Black font strictly enforced */
    border: 2px dashed #000;
    cursor: not-allowed;
}
    
    /* Input placeholder color correction for readability on Teal */
    input::placeholder {
        color: rgba(0, 0, 0, 0.6);
    }

    /* Fetch Button aligned with inputs */
    .input-group > div {
        display: flex;
        gap: 8px;
        height: 55px;
    }

    .btn-fetch {
        height: 100%;
        background: #f0f0f0;
        color: #000;
        border: 2px solid #000;
        padding: 0 20px;
        border-radius: 8px;
        font-weight: 900;
        cursor: pointer;
        text-transform: uppercase;
        transition: transform 0.3s, box-shadow 0.3s;
    }

    .btn-fetch:hover {
        transform: translateY(-4px); /* Lift effect */
        box-shadow: 0 5px 0px #000;
        background: #7FFFD4;
    }

    /* Main Generate Button */
    .btn-generate {
        background: linear-gradient(135deg, #7FFFD4, #20B2AA);
        color: #000;
        border: 3px solid #000;
        padding: 20px;
        font-size: 1.3rem;
        font-weight: 900;
        border-radius: 12px;
        cursor: pointer;
        width: 100%;
        text-transform: uppercase;
        transition: all 0.3s;
        box-shadow: 6px 6px 0px #000;
    }

    .btn-generate:hover {
        transform: translate(-3px, -3px);
        box-shadow: 9px 9px 0px #000;
    }

    /* --- BOTTOM HALF: TIMETABLE GRID (NO BLACK BACKGROUNDS/BORDERS) --- */
    .timetable-container {
        width: 95%;
        margin: 0 auto;
        display: none; 
        overflow-x: auto;
        padding: 20px 10px;
    }

    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 12px;
        border: none;
    }

    th, td {
        border: none; /* NO BLACK BORDERS IN BOTTOM HALF */
        border-radius: 12px;
        padding: 20px 15px;
        text-align: center;
        vertical-align: middle;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    /* Timetable Card Lift Effect */
    th:hover, td:hover {
        transform: translateY(-10px) scale(1.03);
        box-shadow: 0 15px 25px rgba(0,0,0,0.18);
        z-index: 10;
    }

    /* DAYS: Gradient Parrot Green Only (No Black) */
    th:not(.time-col) {
        background: linear-gradient(135deg, #7CFC00, #32CD32);
        font-weight: 900;
        font-size: 1.1rem;
        text-transform: uppercase;
    }

    /* TIME SLOTS: Gradient Modern Blue Only (No Black) */
    th.time-col, td.time-slot {
        background: linear-gradient(135deg, #00c6ff, #0072ff);
        font-weight: 900;
        font-size: 1.05rem;
    }

    /* Default Empty Cell */
    td:not(.time-slot) {
        background-color: #ffffff;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .open-slot {
        font-weight: 900;
        font-size: 1.1rem;
        margin-bottom: 15px;
        opacity: 0.4;
    }

    /* BOOK BUTTON: Gradient Turquoise Only (No Black) */
    .btn-book {
        background: linear-gradient(135deg, #40E0D0, #00CED1);
        color: #000;
        border: none; /* No black border */
        padding: 12px 25px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 900;
        font-size: 1rem;
        text-transform: uppercase;
        box-shadow: 0 6px 15px rgba(0, 206, 209, 0.4);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        width: 100%;
    }

    .btn-book:hover {
        transform: translateY(-5px); /* Lift effect */
        box-shadow: 0 10px 20px rgba(0, 206, 209, 0.6);
    }

    /* BOOKED STATE: Gradient Yellow (No Black) */
    td.booked-cell, td:has(.booked-tag) {
        background: linear-gradient(135deg, #FFF500, #FFB300) !important;
    }

    .booked-tag {
        background: transparent;
        font-weight: 800;
        font-size: 0.95rem;
        margin: 5px 0;
        padding: 5px;
        text-align: left;
        border-bottom: 2px solid rgba(0,0,0,0.1); /* Subtle non-black separator */
    }

    .booked-tag:last-child {
        border-bottom: none;
    }

    /* --- MODAL --- */
    .modal-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255, 255, 255, 0.8); /* White overlay instead of black */
        backdrop-filter: blur(5px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .modal-content {
        background: #ffffff;
        padding: 40px;
        border: 4px solid #000;
        border-radius: 20px;
        width: 90%;
        max-width: 600px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .modal-content p {
        font-size: 1.2rem;
        line-height: 1.8;
        margin-bottom: 30px;
        font-weight: 600;
    }

    .btn-print, .btn-close {
        background: #ffffff;
        border: 3px solid #000;
        padding: 12px 25px;
        font-size: 1.1rem;
        font-weight: 900;
        border-radius: 8px;
        cursor: pointer;
        margin: 5px;
        transition: all 0.3s;
        text-transform: uppercase;
    }

    .btn-print:hover { transform: translateY(-4px); box-shadow: 0 5px 0px #000; background: #7FFFD4; }
    .btn-close:hover { transform: translateY(-4px); box-shadow: 0 5px 0px #000; background: #ff4757; color: #fff;}

    /* --- MOBILE RESPONSIVE --- */
    @media (max-width: 768px) {
        header h1 {
            padding: 15px 20px;
            transform: rotateZ(0deg) rotateX(0deg); /* Disable extreme 3D to fit screen */
            box-shadow: 5px 5px 0px #000;
        }
        header h1::before {
            font-size: 1.5rem;
        }
        .form-grid {
            grid-template-columns: 1fr;
        }
        .form-container {
            padding: 20px;
        }
    }

    @media print {
        body * { visibility: hidden; }
        #confirm-modal, #print-area, #print-area * { visibility: visible; }
        #confirm-modal { position: absolute; top: 0; left: 0; display: block; background: none; }
        #print-area { position: absolute; top: 0; left: 0; width: 100%; border: none; box-shadow: none; }
        .no-print { display: none !important; }
    }






/* ADD THIS TO YOUR STYLE TAG */
.btn-fetch {
    min-width: 100px; /* Ensures the button doesn't shrink to zero */
    flex-shrink: 0;   /* Prevents the input from pushing the button out */
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #f0f0f0 !important; /* Forces background color */
}




#f-teacher-available-slots { color: #000000 !important; font-weight: 900 !important; opacity: 1 !important; -webkit-text-fill-color: #000000; }






/* FIREFOX VISIBILITY FIX */
.input-group > div {
    display: flex !important;
    flex-direction: row !important;
    align-items: stretch !important;
    width: 100% !important;
}

#f-roll {
    flex: 1 1 auto !important;
    min-width: 0 !important; /* Critical for Firefox to allow shrinking */
    width: 100% !important;
}

.btn-fetch {
    flex: 0 0 100px !important; /* Fixes button width at 100px, no shrinking */
    height: 55px !important;
    margin-left: 5px !important;
    display: block !important;
    visibility: visible !important;
    opacity: 1 !important;
}
</style>
</head>
<body>

    <header>
        <h1>Auto Time Table Generator</h1>
    </header>

    <div class="form-container">
    <h2 id="welcome-msg" style="text-align: center; margin-bottom: 20px; color: #20B2AA;">Loading Session...</h2>
    
    <!-- DYNAMIC SUMMARY TABLE (Task 2: Captured from Session) -->
    <div id="session-summary-area" style="overflow-x: auto; margin-bottom: 30px; border: 2px solid #eee; border-radius: 10px; padding: 10px;">
        <table style="width: 100%; border-spacing: 0; font-size: 0.85rem;">
            <thead>
                <tr style="background: #f8f9fa;">
                    <th style="padding:10px; border-bottom:2px solid #20B2AA;">Roll No</th>
                    <th style="padding:10px; border-bottom:2px solid #20B2AA;">Student Name</th>
                    <th style="padding:10px; border-bottom:2px solid #20B2AA;">Teacher Allotted</th>
                    <th style="padding:10px; border-bottom:2px solid #20B2AA;">Teacher ID</th>
                    <th style="padding:10px; border-bottom:2px solid #20B2AA;">Subject</th>
                    <th style="padding:10px; border-bottom:2px solid #20B2AA;">Batch Name</th>
                    <th style="padding:10px; border-bottom:20px solid #20B2AA;">Official Time</th>
                    <th style="padding:10px; border-bottom:20px solid #20B2AA;">Action</th>
                </tr>
            </thead>
            <tbody id="summary-body">
                <!-- Data from 'list' and 'batches' tables injected here -->
            </tbody>
        </table>
    </div>

    <div class="form-grid">
        <!-- Keep only these two for the user to select -->
        <div class="input-group">
            <label>1. Select Booking Date (Tomorrow)</label>
            <input type="date" id="f-date">
        </div>

        <div class="input-group">
            <label>2. Preferred Time Slot</label>
            <select id="f-time">
                <option value="09:00 AM to 10:00 AM">09:00 AM to 10:00 AM</option>
                <option value="10:00 AM to 11:00 AM">10:00 AM to 11:00 AM</option>
                <option value="11:00 AM to 12:00 PM">11:00 AM to 12:00 PM</option>
                <option value="12:00 PM to 01:00 PM">12:00 PM to 01:00 PM</option>
                <option value="01:00 PM to 02:00 PM">01:00 PM to 02:00 PM</option>
                <option value="02:00 PM to 03:00 PM">02:00 PM to 03:00 PM</option>
                <option value="03:00 PM to 04:00 PM">03:00 PM to 04:00 PM</option>
                <option value="04:00 PM to 05:00 PM">04:00 PM to 05:00 PM</option>
                <option value="05:00 PM to 06:00 PM">05:00 PM to 06:00 PM</option>
                <option value="06:00 PM to 07:00 PM">06:00 PM to 07:00 PM</option>
                <option value="07:00 PM to 08:00 PM">07:00 PM to 08:00 PM</option>
                <option value="08:00 PM to 09:00 PM">08:00 PM to 09:00 PM</option>
            </select>
        </div>
    </div>

    <!-- Hidden placeholders to keep the old Booking Logic working -->
    <input type="hidden" id="f-roll">
    <input type="hidden" id="f-student-name">
    <input type="hidden" id="f-course">
    <input type="hidden" id="f-teacher-name">
    <input type="hidden" id="f-teacher-id">
    <input type="hidden" id="f-official-slots"> <!-- New: stores the official batch time -->

    <div id="preferred-slot-status" style="text-align: center; font-weight: 900; margin-bottom: 15px; font-size: 1.1rem;"></div>
    <button type="button" class="btn-generate" onclick="generateTimeTable()" id="main-gen-btn" style="display:none;">SHOW BOOKING GRID</button>
</div>


    <script>
    const _supabaseUrl = 'https://classmanager-api.sunilvasarkar1975.workers.dev';
const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyendpam5sYm53amRsbHV2eHlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNTkzMDgsImV4cCI6MjA4NjgzNTMwOH0.H8c9tT5HsxeL4xJAM9KrKmb1v6KKO8dZ-NOB-Pz2G2k';
const db = supabase.createClient(_supabaseUrl, _supabaseKey);

let sessionInstID = "";
let currentUserProfile = null;

// 1. SESSION INITIALIZATION
async function initSession() {
    const { data: { user } } = await db.auth.getUser();
    if (!user) {
        alert("Please login first!");
        window.close();
        return;
    }

    const { data: profile } = await db.from('profiles').select('*').eq('id', user.id).single();
    currentUserProfile = profile;
    sessionInstID = profile.institute_id;
    
    document.getElementById('welcome-msg').innerText = `Welcome, ${profile.full_name} (${profile.role})`;
    
    loadAssignmentSummary();
}

// 2. CAPTURE DATA FROM LIST & BATCHES TABLES
async function loadAssignmentSummary() {
    const tbody = document.getElementById('summary-body');
    let query = db.from('list').select('*').eq('institute_id', sessionInstID);

    // Filter based on who is logged in
    if (currentUserProfile.role === 'Student') {
        query = query.eq('student_name', currentUserProfile.full_name.toUpperCase());
    } else if (currentUserProfile.role === 'Teacher') {
        query = query.eq('teacher_name', currentUserProfile.full_name.toUpperCase());
    }

    const { data: listData, error } = await query;
    if (error || !listData.length) {
        tbody.innerHTML = `<tr><td colspan="8">No assignments found for your account.</td></tr>`;
        return;
    }

    // Get Batch times for each assignment
    const { data: batchData } = await db.from('batches').select('batch_name, batch_time').eq('institute_id', sessionInstID);

    tbody.innerHTML = "";
    listData.forEach(item => {
        const batchInfo = batchData.find(b => b.batch_name === item.batch_name);
        const bTime = batchInfo ? batchInfo.batch_time : "N/A";

        const row = `
            <tr>
                <td style="padding:10px; border-bottom:1px solid #eee;">${item.roll_number}</td>
                <td style="padding:10px; border-bottom:1px solid #eee;">${item.student_name}</td>
                <td style="padding:10px; border-bottom:1px solid #eee;">${item.teacher_name}</td>
                <td style="padding:10px; border-bottom:1px solid #eee;">${item.teacher_id}</td>
                <td style="padding:10px; border-bottom:1px solid #eee;">${item.course_name}</td>
                <td style="padding:10px; border-bottom:1px solid #eee;">${item.batch_name}</td>
                <td style="padding:10px; border-bottom:1px solid #eee; font-weight:bold; color:#007bff;">${bTime}</td>
                <td style="padding:10px; border-bottom:1px solid #eee;">
                    <button onclick="selectForBooking('${item.roll_number}', '${item.student_name}', '${item.course_name}', '${item.teacher_name}', '${item.teacher_id}', '${bTime}')" 
                    style="background:#20B2AA; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">SELECT</button>
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
}

// 3. SELECT ASSIGNMENT & LOAD GRID
function selectForBooking(roll, sName, course, tName, tId, bTime) {
    document.getElementById('f-roll').value = roll;
    document.getElementById('f-student-name').value = sName;
    document.getElementById('f-course').value = course;
    document.getElementById('f-teacher-name').value = tName;
    document.getElementById('f-teacher-id').value = tId;
    document.getElementById('f-official-slots').value = bTime;

    document.getElementById('main-gen-btn').style.display = 'block';
    document.getElementById('main-gen-btn').innerText = `SHOW GRID FOR ${course} (${tName})`;
    
    // Clear status
    document.getElementById('preferred-slot-status').innerText = "Slot Selected: " + course;
    document.getElementById('preferred-slot-status').style.color = "#000";
}

// 4. MODIFIED GENERATE GRID (WITH VALIDATIONS)
async function generateTimeTable() {
    const dateVal = document.getElementById('f-date').value;
    const prefTime = document.getElementById('f-time').value;
    const officialTime = document.getElementById('f-official-slots').value;
    const tId = document.getElementById('f-teacher-id').value;

    if (!dateVal) return alert("Select a date!");

    // VALIDATION: Check if Preferred Time matches Official Batch Time
    const statusDiv = document.getElementById('preferred-slot-status');
    if (!officialTime.includes(prefTime)) {
        statusDiv.innerText = "❌ ERROR: Preferred time is NOT within the Teacher's Batch timing!";
        statusDiv.style.color = "red";
    } else {
        statusDiv.innerText = "✅ VALID: Preferred time matches Batch hours.";
        statusDiv.style.color = "green";
    }

    const { data: bookings } = await db.from("class_bookings").select("*")
        .eq("booking_date", dateVal)
        .eq("teacher_id", tId)
        .eq("institute_id", sessionInstID);

    renderGrid(bookings, dateVal);
}

function renderGrid(bookings, dateVal) {
    const SLOTS = ["09:00 AM to 10:00 AM", "10:00 AM to 11:00 AM", "11:00 AM to 12:00 PM", "12:00 PM to 01:00 PM", "01:00 PM to 02:00 PM", "02:00 PM to 03:00 PM", "03:00 PM to 04:00 PM", "04:00 PM to 05:00 PM", "05:00 PM to 06:00 PM", "06:00 PM to 07:00 PM", "07:00 PM to 08:00 PM", "08:00 PM to 09:00 PM"];
    const DAYS = ["MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY", "SUNDAY"];
    const activeDayName = DAYS[(new Date(dateVal).getDay() + 6) % 7]; // JS Day sync

    const tbody = document.getElementById('timetable-body');
    tbody.innerHTML = '';

    SLOTS.forEach(time => {
        const tr = document.createElement('tr');
        const tdTime = document.createElement('td');
        tdTime.className = 'time-slot';
        tdTime.innerText = time;
        tr.appendChild(tdTime);

        DAYS.forEach(day => {
            const td = document.createElement('td');
            if (day !== activeDayName) {
                td.style.opacity = "0.2";
                td.style.pointerEvents = "none";
            }

            const isBooked = bookings?.some(b => b.time_slot === time);
            if (isBooked) {
                td.innerHTML = `<span style="color:red; font-weight:bold;">BOOKED</span>`;
                td.className = "booked-cell";
            } else {
                td.innerHTML = `<button class="btn-book" onclick="bookSlot('${day}', '${time}')">BOOK</button>`;
            }
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });
    document.getElementById('timetable-wrapper').style.display = 'block';
}

// 5. MODIFIED BOOKING LOGIC
async function bookSlot(day, time) {
    const roll = document.getElementById('f-roll').value;
    const tId = document.getElementById('f-teacher-id').value;
    const dateVal = document.getElementById('f-date').value;
    const course = document.getElementById('f-course').value;
    const officialTime = document.getElementById('f-official-slots').value;

    if (!officialTime.includes(time)) return alert("Cannot book outside official batch hours!");

    const { error } = await db.from("class_bookings").insert({
        institute_id: sessionInstID,
        teacher_id: tId,
        student_roll: roll,
        booking_date: dateVal,
        time_slot: time,
        course: course
    });

    if (error) alert(error.message);
    else {
        alert("Booking Confirmed!");
        generateTimeTable();
    }
}

// Run on start
initSession();

// Setup Date
window.onload = function() {
    const tmrw = new Date();
    tmrw.setDate(tmrw.getDate() + 1);
    document.getElementById('f-date').value = tmrw.toISOString().split('T')[0];
};
</script>
</body>
</html>
