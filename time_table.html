<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Time Table Generator</title>

    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        color: #000000; /* Black font on the whole page */
    }

    body {
        background-color: #ffffff; /* Total white background */
        padding-bottom: 60px;
    }

    /* --- TITLE: 3D BOX, AQUAMARINE GRADIENT, TILTED --- */
    header {
        text-align: center;
        padding: 50px 20px 40px;
        perspective: 1000px;
    }

    header h1 {
        display: inline-block;
        font-size: 0; /* Hides original HTML text to replace it */
        background: linear-gradient(135deg, #7FFFD4, #20B2AA); /* Gradient aquamarine */
        border: 4px solid #000;
        padding: 20px 40px;
        border-radius: 15px;
        /* 3D tilt effect */
        transform: rotateZ(-2deg) rotateX(15deg) rotateY(-5deg);
        box-shadow: 10px 10px 0px #000, 15px 15px 25px rgba(0,0,0,0.2);
        transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    header h1:hover {
        transform: rotateZ(0deg) rotateX(5deg) scale(1.05); /* Lifts up on hover */
        box-shadow: 15px 15px 0px #000, 20px 20px 30px rgba(0,0,0,0.3);
    }

    header h1::before {
        content: "TIME-TABLE GENERATOR - AUTO";
        font-size: 2.5rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #000000;
    }

    /* --- TOP PORTION: FORM & EQUAL SIZED BOXES --- */
    .form-container {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto 40px;
        border: 3px solid #000;
        padding: 35px;
        border-radius: 16px;
        background-color: #ffffff;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        transition: transform 0.3s;
    }

    .form-container:hover {
        transform: translateY(-5px); /* Lift effect */
        box-shadow: 0 15px 30px rgba(0,0,0,0.12);
    }

    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 25px;
        margin-bottom: 30px;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .input-group label {
        font-weight: 800;
        font-size: 0.95rem;
        text-transform: uppercase;
    }

    /* Equal Sized Inputs & Selects */
    input, select {
        height: 55px; /* Ensures all boxes are exactly the same height */
        padding: 10px 15px;
        border: 2px solid #000;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        background: #ffffff;
        transition: transform 0.3s, box-shadow 0.3s;
    }

    input:focus, select:focus {
        outline: none;
        border-color: #20B2AA;
        box-shadow: 0 0 0 3px rgba(127, 255, 212, 0.4);
    }

    input:hover:not(), select:hover {
        transform: translateY(-4px); /* Lift effect */
        box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    }

    /* Teal Color for Greyed-out (Readonly) Fields */
input[readonly] {
    background: linear-gradient(135deg, #008080, #40E0D0); /* Gradient Teal */
    color: #000; /* Black font strictly enforced */
    border: 2px dashed #000;
    cursor: not-allowed;
}
    
    /* Input placeholder color correction for readability on Teal */
    input::placeholder {
        color: rgba(0, 0, 0, 0.6);
    }

    /* Fetch Button aligned with inputs */
    .input-group > div {
        display: flex;
        gap: 8px;
        height: 55px;
    }

    .btn-fetch {
        height: 100%;
        background: #f0f0f0;
        color: #000;
        border: 2px solid #000;
        padding: 0 20px;
        border-radius: 8px;
        font-weight: 900;
        cursor: pointer;
        text-transform: uppercase;
        transition: transform 0.3s, box-shadow 0.3s;
    }

    .btn-fetch:hover {
        transform: translateY(-4px); /* Lift effect */
        box-shadow: 0 5px 0px #000;
        background: #7FFFD4;
    }

    /* Main Generate Button */
    .btn-generate {
        background: linear-gradient(135deg, #7FFFD4, #20B2AA);
        color: #000;
        border: 3px solid #000;
        padding: 20px;
        font-size: 1.3rem;
        font-weight: 900;
        border-radius: 12px;
        cursor: pointer;
        width: 100%;
        text-transform: uppercase;
        transition: all 0.3s;
        box-shadow: 6px 6px 0px #000;
    }

    .btn-generate:hover {
        transform: translate(-3px, -3px);
        box-shadow: 9px 9px 0px #000;
    }

    /* --- BOTTOM HALF: TIMETABLE GRID (NO BLACK BACKGROUNDS/BORDERS) --- */
    .timetable-container {
        width: 95%;
        margin: 0 auto;
        display: none; 
        overflow-x: auto;
        padding: 20px 10px;
    }

    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 12px;
        border: none;
    }

    th, td {
        border: none; /* NO BLACK BORDERS IN BOTTOM HALF */
        border-radius: 12px;
        padding: 20px 15px;
        text-align: center;
        vertical-align: middle;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    /* Timetable Card Lift Effect */
    th:hover, td:hover {
        transform: translateY(-10px) scale(1.03);
        box-shadow: 0 15px 25px rgba(0,0,0,0.18);
        z-index: 10;
    }

    /* DAYS: Gradient Parrot Green Only (No Black) */
    th:not(.time-col) {
        background: linear-gradient(135deg, #7CFC00, #32CD32);
        font-weight: 900;
        font-size: 1.1rem;
        text-transform: uppercase;
    }

    /* TIME SLOTS: Gradient Modern Blue Only (No Black) */
    th.time-col, td.time-slot {
        background: linear-gradient(135deg, #00c6ff, #0072ff);
        font-weight: 900;
        font-size: 1.05rem;
    }

    /* Default Empty Cell */
    td:not(.time-slot) {
        background-color: #ffffff;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .open-slot {
        font-weight: 900;
        font-size: 1.1rem;
        margin-bottom: 15px;
        opacity: 0.4;
    }

    /* BOOK BUTTON: Gradient Turquoise Only (No Black) */
    .btn-book {
        background: linear-gradient(135deg, #40E0D0, #00CED1);
        color: #000;
        border: none; /* No black border */
        padding: 12px 25px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 900;
        font-size: 1rem;
        text-transform: uppercase;
        box-shadow: 0 6px 15px rgba(0, 206, 209, 0.4);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        width: 100%;
    }

    .btn-book:hover {
        transform: translateY(-5px); /* Lift effect */
        box-shadow: 0 10px 20px rgba(0, 206, 209, 0.6);
    }

    /* BOOKED STATE: Gradient Yellow (No Black) */
    td.booked-cell, td:has(.booked-tag) {
        background: linear-gradient(135deg, #FFF500, #FFB300) !important;
    }

    .booked-tag {
        background: transparent;
        font-weight: 800;
        font-size: 0.95rem;
        margin: 5px 0;
        padding: 5px;
        text-align: left;
        border-bottom: 2px solid rgba(0,0,0,0.1); /* Subtle non-black separator */
    }

    .booked-tag:last-child {
        border-bottom: none;
    }

    /* --- MODAL --- */
    .modal-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255, 255, 255, 0.8); /* White overlay instead of black */
        backdrop-filter: blur(5px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .modal-content {
        background: #ffffff;
        padding: 40px;
        border: 4px solid #000;
        border-radius: 20px;
        width: 90%;
        max-width: 600px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .modal-content p {
        font-size: 1.2rem;
        line-height: 1.8;
        margin-bottom: 30px;
        font-weight: 600;
    }

    .btn-print, .btn-close {
        background: #ffffff;
        border: 3px solid #000;
        padding: 12px 25px;
        font-size: 1.1rem;
        font-weight: 900;
        border-radius: 8px;
        cursor: pointer;
        margin: 5px;
        transition: all 0.3s;
        text-transform: uppercase;
    }

    .btn-print:hover { transform: translateY(-4px); box-shadow: 0 5px 0px #000; background: #7FFFD4; }
    .btn-close:hover { transform: translateY(-4px); box-shadow: 0 5px 0px #000; background: #ff4757; color: #fff;}

    /* --- MOBILE RESPONSIVE --- */
    @media (max-width: 768px) {
        header h1 {
            padding: 15px 20px;
            transform: rotateZ(0deg) rotateX(0deg); /* Disable extreme 3D to fit screen */
            box-shadow: 5px 5px 0px #000;
        }
        header h1::before {
            font-size: 1.5rem;
        }
        .form-grid {
            grid-template-columns: 1fr;
        }
        .form-container {
            padding: 20px;
        }
    }

    @media print {
        body * { visibility: hidden; }
        #confirm-modal, #print-area, #print-area * { visibility: visible; }
        #confirm-modal { position: absolute; top: 0; left: 0; display: block; background: none; }
        #print-area { position: absolute; top: 0; left: 0; width: 100%; border: none; box-shadow: none; }
        .no-print { display: none !important; }
    }






/* ADD THIS TO YOUR STYLE TAG */

    min-width: 100px; /* Ensures the button doesn't shrink to zero */
    flex-shrink: 0;   /* Prevents the input from pushing the button out */
    display: flex;

/* FIREFOX VISIBILITY FIX */

}

}

    height: 55px !important;

    display: block !important;
    visibility: visible !important;
    opacity: 1 !important;
}
</style>
</head>
<body>

    <header>
        <h1>Auto Time Table Generator</h1>
    </header>

    <div class="form-container">
     <div class="form-grid">
    <!-- 1. Student Roll Number -->
    <div class="input-group">
        <label>1. Student Roll Number</label>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="f-roll" placeholder="Enter Roll Number" style="flex: 1;">

            <option value="01:00 PM to 02:00 PM">01:00 PM to 02:00 PM</option>
            <option value="02:00 PM to 03:00 PM">02:00 PM to 03:00 PM</option>
            <option value="03:00 PM to 04:00 PM">03:00 PM to 04:00 PM</option>
            <option value="04:00 PM to 05:00 PM">04:00 PM to 05:00 PM</option>
            <option value="05:00 PM to 06:00 PM">05:00 PM to 06:00 PM</option>
            <option value="06:00 PM to 07:00 PM">06:00 PM to 07:00 PM</option>
            <option value="07:00 PM to 08:00 PM">07:00 PM to 08:00 PM</option>
            <option value="08:00 PM to 09:00 PM">08:00 PM to 09:00 PM</option>
        </select>
    </div>
</div>

<!-- Teal Box for Available Slots -->
<div class="input-group" style="width: 90%; max-width: 1200px; margin: 0 auto 20px;">
    <label style="color: #20B2AA;">Teacher's Official Batch Time Slot (From Section 5)</label>
    <input type="text" id="f-teacher-available-slots" readonly placeholder="Select teacher to see time..." style="font-weight:bold;">
</div>



<div id="preferred-slot-status" style="text-align: center; font-weight: 900; margin-bottom: 15px; font-size: 1.1rem;"></div>




        <button type="button" class="btn-generate" onclick="generateTimeTable()">GENERATE AUTO TIME TABLE</button>
    </div>

    <div class="timetable-container" id="timetable-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="time-col">TIME / DAY</th>
                    <th class="day-mon">MONDAY</th>

                <!-- Rows injected by JS -->

    <!-- Confirmation Modal -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-content" id="print-area">
            <h2 style="margin-bottom: 15px; text-decoration: underline;">BOOKING CONFIRMATION</h2>
            <p id="confirmation-text"></p>
            <div class="no-print" style="margin-top: 20px;">
                <button type="button" class="btn-print" onclick="window.print()"><i class="fas fa-print"></i> SAVE & PRINT</button>
                <button type="button" class="btn-close" onclick="closeModal()">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. SUPABASE INITIALIZATION ---
// --- 1. INITIALIZATION & DATABASE CONNECTION ---
const _supabaseUrl = 'https://classmanager-api.sunilvasarkar1975.workers.dev';
const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyendpam5sYm53amRsbHV2eHlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNTkzMDgsImV4cCI6MjA4NjgzNTMwOH0.H8c9tT5HsxeL4xJAM9KrKmb1v6KKO8dZ-NOB-Pz2G2k';
const db = supabase.createClient(_supabaseUrl, _supabaseKey);

let sessionInstID = "";
let currentStudentAssignments = []; 

const TIME_SLOTS = [
    "09:00 AM to 10:00 AM", "10:00 AM to 11:00 AM", "11:00 AM to 12:00 PM",
    "12:00 PM to 01:00 PM", "01:00 PM to 02:00 PM", "02:00 PM to 03:00 PM",
    "03:00 PM to 04:00 PM", "04:00 PM to 05:00 PM", "05:00 PM to 06:00 PM",
    "06:00 PM to 07:00 PM", "07:00 PM to 08:00 PM", "08:00 PM to 09:00 PM"
];

const DAYS = ["MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY", "SUNDAY"];

// --- 2. AUTHENTICATION HELPERS ---
async function checkCurrentSession() {
    const { data: { user } } = await db.auth.getUser();
    if (user) {
        const { data: profile } = await db.from('profiles').select('institute_id').eq('id', user.id).maybeSingle();
        if (profile) sessionInstID = profile.institute_id;
    }
}
checkCurrentSession();

async function authenticateForBooking() {
    await checkCurrentSession();
    if (!sessionInstID) {
        alert("Session error. Please ensure you are logged into the main application.");
        return false;
    }
    return true;
}

// --- 3. FETCH STUDENT & LINKED DATA (USE LIST TABLE) ---
async function fetchStudent() {
    const roll = document.getElementById('f-roll').value.trim().toUpperCase();
    if (!roll) return alert("Please enter Student Roll Number.");
    if (!sessionInstID) await authenticateForBooking();

    const { data: assignments, error } = await db.from('list')
        .select('teacher_name, course_name, batch_name, student_name, teacher_id')
        .eq('roll_number', roll)
        .eq('institute_id', sessionInstID);

    if (error || !assignments || assignments.length === 0) {
        return alert("No batch assignments found for this Roll Number in Batch Master (List).");
    }

    currentStudentAssignments = assignments;
    document.getElementById('f-student-name').value = assignments[0].student_name;

    const idSelect = document.getElementById('f-teacher-id');
    const nameSelect = document.getElementById('f-teacher-name');
    const batchSelect = document.getElementById('f-batch-name');

    idSelect.innerHTML = '';
    nameSelect.innerHTML = '';
    batchSelect.innerHTML = '';

    assignments.forEach((item, index) => {
        idSelect.innerHTML += `<option value="${index}">${item.teacher_id}</option>`;
        nameSelect.innerHTML += `<option value="${index}">${item.teacher_name}</option>`;
        batchSelect.innerHTML += `<option value="${index}">${item.batch_name}</option>`;
    });

    syncAssignments('id'); 
    alert("Records Loaded! Dropdowns 3, 4, and 5 are now synced.");
}

// --- 4. SYNC THE 3 DROPDOWNS & FETCH TIME (USE BATCHES TABLE) ---
async function syncAssignments(changedType) {
    let index;
    if (changedType === 'id') index = document.getElementById('f-teacher-id').value;
    else if (changedType === 'name') index = document.getElementById('f-teacher-name').value;
    else index = document.getElementById('f-batch-name').value;

    if (index === "") return;

    document.getElementById('f-teacher-id').value = index;
    document.getElementById('f-teacher-name').value = index;
    document.getElementById('f-batch-name').value = index;

    const selected = currentStudentAssignments[index];
    document.getElementById('f-course').value = selected.course_name;

    const { data: batchInfo } = await db.from('batches')
        .select('batch_time')
        .eq('batch_name', selected.batch_name)
        .eq('institute_id', sessionInstID)
        .maybeSingle();

    const slotsInput = document.getElementById("f-teacher-available-slots");
    slotsInput.value = batchInfo ? batchInfo.batch_time : "Time not assigned in Section 5.";
}

// --- 5. GENERATE TIMETABLE GRID ---
async function generateTimeTable() {
    const dateVal = document.getElementById('f-date').value;
    const roll = document.getElementById('f-roll').value.trim();
    const idSelect = document.getElementById('f-teacher-id');
    const statusDiv = document.getElementById('preferred-slot-status');
    const officialBatchTime = document.getElementById('f-teacher-available-slots').value;
    const preferredTime = document.getElementById('f-time').value;

    if (!roll || idSelect.selectedIndex === -1) return alert("Fetch Roll Number and select Teacher first.");

    const teacherId = idSelect.options[idSelect.selectedIndex].text;

    if (officialBatchTime.includes(preferredTime)) {
        statusDiv.innerText = "✅ PREFERRED SLOT IS AVAILABLE";
        statusDiv.style.color = "#2ed573";
    } else {
        statusDiv.innerText = "❌ PREFERRED SLOT NOT IN BATCH HOURS";
        statusDiv.style.color = "#ff4757";
    }

    const { data: bookings } = await db.from("class_bookings").select("*").eq("institute_id", sessionInstID).eq("booking_date", dateVal);

    const tbody = document.getElementById('timetable-body');
    tbody.innerHTML = '';

    TIME_SLOTS.forEach((timeStr, rowIndex) => {
        const tr = document.createElement('tr');
        const tdTime = document.createElement('td');
        tdTime.className = 'time-slot';
        tdTime.innerText = timeStr;
        tr.appendChild(tdTime);

        DAYS.forEach((dayStr, colIndex) => {
            const td = document.createElement('td');
            const cellId = `cell-${rowIndex}-${colIndex}`;
            td.id = cellId;

            const activeDayName = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"][new Date(dateVal).getDay()];
            if (dayStr.toUpperCase() !== activeDayName) {
                td.style.opacity = "0.3";
                td.style.pointerEvents = "none";
            }

            const isBooked = bookings?.some(b => b.time_slot === timeStr && b.day === dayStr && b.teacher_id === teacherId);

            if (isBooked) {
                td.innerHTML = `<span style="color:red; font-weight:bold;">TEACHER BOOKED</span>`;
                td.classList.add("booked-cell");
                const bData = bookings.find(b => b.time_slot === timeStr && b.teacher_id === teacherId);
                if (bData) td.innerHTML += `<br><button type="button" style="background:red; color:white; border:2px solid black; padding:4px 8px; font-size:0.7rem; cursor:pointer; margin-top:10px; border-radius:4px;" onclick="deleteFakeBooking('${bData.id}')">❌ DELETE</button>`;
            } else {
                td.innerHTML = `<span class="open-slot">OPEN SLOT</span><br><button type="button" class="btn-book" onclick="bookSlot('${dayStr}', '${timeStr}', '${cellId}')">BOOK</button>`;
            }
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });
    document.getElementById('timetable-wrapper').style.display = 'block';
}

// --- 6. BOOK SLOT & SAVE TO DATABASE ---
async function bookSlot(day, time, cellId) {
    const roll = document.getElementById('f-roll').value.trim();
    const student = document.getElementById('f-student-name').value.trim();
    const dateVal = document.getElementById('f-date').value;
    const course = document.getElementById('f-course').value;
    const officialBatchTime = document.getElementById('f-teacher-available-slots').value;

    const idSelect = document.getElementById('f-teacher-id');
    const nameSelect = document.getElementById('f-teacher-name');
    const teacherId = idSelect.options[idSelect.selectedIndex].text;
    const teacherName = nameSelect.options[nameSelect.selectedIndex].text;

    if (!officialBatchTime.includes(time)) return alert("❌ DENIED: Slot not in official batch timings.");
    if (!sessionInstID) await authenticateForBooking();

    const { data: tData } = await db.from('teacher_details').select('mobile').eq('id', teacherId).eq('institute_id', sessionInstID).single();
    
    if (tData && tData.mobile) {
        const cleanPhone = tData.mobile.replace(/\D/g, '');
        const finalPhone = cleanPhone.length === 10 ? '91' + cleanPhone : cleanPhone;
        const msg = `📚 *New Timetable Booking*\nStudent: ${student}\nSubject: ${course}\nDate: ${dateVal}\nTime: ${time}`;
        window.open(`https://wa.me/${finalPhone}?text=${encodeURIComponent(msg)}`, "_blank");

        if (!window.confirm("Did you send the message to " + teacherName + "? Click OK to confirm booking.")) return;
    }

    const { data: bookingData, error: insertError } = await db.from("class_bookings").insert({
        institute_id: sessionInstID, teacher_id: teacherId, student_roll: roll,
        booking_date: dateVal, time_slot: time, day: day, course: course
    }).select().single();

    if (insertError) return alert("Error: " + insertError.message);

    const cell = document.getElementById(cellId);
    cell.innerHTML = `<div class="booked-tag"><b>BOOKED</b></div><div class="booked-tag">Teacher: ${teacherName}</div><button type="button" style="background:red; color:white; border:2px solid black; padding:4px 8px; font-size:0.7rem; cursor:pointer; margin-top:5px; border-radius:4px;" onclick="deleteFakeBooking('${bookingData.id}')">❌ DELETE</button>`;
    cell.classList.add("booked-cell");
    alert("Booking successfully saved!");
}

// --- 7. MISC HELPERS ---
async function deleteFakeBooking(bookingId) {
    const pin = prompt("TEACHER ONLY: Enter PIN to delete:");
    if (pin !== "1234") return alert("Invalid PIN.");
    const { error } = await db.from('class_bookings').delete().eq('id', bookingId);
    if (!error) { alert("Slot Freed!"); generateTimeTable(); }
}

window.onload = function() {
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    const dateInput = document.getElementById('f-date');
    if (dateInput) {
        dateInput.value = tomorrow.toISOString().split('T')[0];
        dateInput.setAttribute('min', dateInput.value);
    }
};
    </script>
