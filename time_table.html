<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Time Table Generator</title>

    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    

<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: #000; }
    body { background-color: #fff; padding-bottom: 60px; }
    header { text-align: center; padding: 50px 20px 40px; perspective: 1000px; }
    header h1 {
        display: inline-block; background: linear-gradient(135deg, #7FFFD4, #20B2AA);
        border: 4px solid #000; padding: 20px 40px; border-radius: 15px;
        transform: rotateZ(-2deg) rotateX(15deg) rotateY(-5deg);
        box-shadow: 10px 10px 0px #000; font-weight: 900; text-transform: uppercase; font-size: 2.2rem;
    }
    .form-container { width: 90%; max-width: 1200px; margin: 0 auto 40px; border: 3px solid #000; padding: 35px; border-radius: 16px; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 25px; margin-bottom: 30px; }
    .input-group { display: flex; flex-direction: column; gap: 8px; position: relative; }
    .input-group label { font-weight: 800; font-size: 0.95rem; text-transform: uppercase; }
    
    /* Icon inside input logic */
    .roll-wrapper { position: relative; width: 100%; }
    .roll-wrapper input { width: 100%; padding-right: 45px !important; }
    .btn-fetch-icon { 
        position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
        background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #20B2AA;
    }

    input, select { height: 55px; padding: 10px 15px; border: 2px solid #000; border-radius: 8px; font-size: 1rem; font-weight: 600; background: #fff; }

    /* The Rectangular Timing Box */
    .timing-rect-box {
        background: linear-gradient(135deg, #008080, #40E0D0);
        border: 3px solid #000; padding: 20px; border-radius: 12px;
        text-align: center; font-size: 1.5rem; font-weight: 900;
        margin-bottom: 25px; box-shadow: 6px 6px 0px #000;
    }

    .btn-generate {
        background: linear-gradient(135deg, #7FFFD4, #20B2AA); border: 3px solid #000;
        padding: 20px; font-size: 1.3rem; font-weight: 900; border-radius: 12px;
        cursor: pointer; width: 100%; text-transform: uppercase; box-shadow: 6px 6px 0px #000;
    }

    /* Timetable Colors */
    .timetable-container { width: 95%; margin: 0 auto; display: none; overflow-x: auto; padding: 20px 10px; }
    table { width: 100%; border-collapse: separate; border-spacing: 12px; }
    th, td { border-radius: 12px; padding: 20px 15px; text-align: center; box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
    th { background: linear-gradient(135deg, #7CFC00, #32CD32); font-weight: 900; }
    th.time-col, td.time-slot { background: linear-gradient(135deg, #00c6ff, #0072ff); color: #fff; font-weight: 900; }
    .booked-cell { background: linear-gradient(135deg, #FFF500, #FFB300) !important; font-weight: bold; }
    .btn-book { background: linear-gradient(135deg, #40E0D0, #00CED1); border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 900; width: 100%; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #fff; padding: 40px; border: 4px solid #000; border-radius: 20px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
</style>
</head>
<body>

<header><h1>Time-Table Generator - Auto</h1></header>

<div class="form-container">
    <div class="form-grid">
        <!-- 1. Student Roll Dropdown with Inner Fetch Icon -->
        <div class="input-group">
            <label>1. Student Roll No</label>
            <div class="roll-wrapper">
                <input type="text" id="f-roll-input" placeholder="Type Roll No & Click Icon">
                <button type="button" class="btn-fetch-icon" onclick="fetchAssignments()">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <select id="f-roll-dropdown" onchange="syncUI(this.value)" style="margin-top:5px; display:none;"></select>
        </div>

        <!-- 2. Student Name Dropdown -->
        <div class="input-group">
            <label>2. Student Name</label>
            <select id="f-student-name" onchange="syncUI(this.value)">
                <option value="">-- Fetch First --</option>
            </select>
        </div>

        <!-- 3. Teacher ID Dropdown -->
        <div class="input-group">
            <label>3. Teacher ID</label>
            <select id="f-teacher-id" onchange="syncUI(this.value)">
                <option value="">-- Fetch First --</option>
            </select>
        </div>

        <!-- 4. Teacher Name Dropdown -->
        <div class="input-group">
            <label>4. Teacher Name</label>
            <select id="f-teacher-name" onchange="syncUI(this.value)">
                <option value="">-- Fetch First --</option>
            </select>
        </div>

        <!-- Booking Parameters -->
        <div class="input-group">
            <label>5. Booking Date</label>
            <input type="date" id="f-date">
        </div>

        <div class="input-group">
            <label>6. Preferred Time Slot</label>
            <select id="f-time">
                <option>09:00 AM to 10:00 AM</option><option>10:00 AM to 11:00 AM</option>
                <option>11:00 AM to 12:00 PM</option><option>12:00 PM to 01:00 PM</option>
                <option>01:00 PM to 02:00 PM</option><option>02:00 PM to 03:00 PM</option>
                <option>03:00 PM to 04:00 PM</option><option>04:00 PM to 05:00 PM</option>
                <option>05:00 PM to 06:00 PM</option><option>06:00 PM to 07:00 PM</option>
                <option>07:00 PM to 08:00 PM</option><option>08:00 PM to 09:00 PM</option>
            </select>
        </div>
    </div>

    <!-- The Dynamic Teal Timing Box -->
    <label style="font-weight: 800; text-transform: uppercase;">Official Batch Timings</label>
    <div class="timing-rect-box" id="f-official-timing">Select Subject/Teacher to see time</div>

    <div id="preferred-slot-status" style="text-align: center; font-weight: 900; margin-bottom: 15px;"></div>
    <button type="button" class="btn-generate" onclick="generateTimeTable()">Generate Auto Time Table</button>
</div>

<div class="timetable-container" id="timetable-wrapper">
    <table>
        <thead>
            <tr>
                <th class="time-col">TIME / DAY</th>
                <th>MONDAY</th><th>TUESDAY</th><th>WEDNESDAY</th><th>THURSDAY</th><th>FRIDAY</th><th>SATURDAY</th><th>SUNDAY</th>
            </tr>
        </thead>
        <tbody id="timetable-body"></tbody>
    </table>
</div>

<div class="modal-overlay" id="confirm-modal">
    <div class="modal-content" id="print-area">
        <h2 style="text-decoration: underline;">BOOKING CONFIRMATION</h2>
        <p id="confirmation-text" style="margin: 25px 0; font-weight: 600; font-size: 1.1rem;"></p>
        <button class="btn-generate" style="padding: 10px; width: 120px;" onclick="window.print()">PRINT</button>
        <button class="btn-generate" style="padding: 10px; width: 120px; background: #ff4757;" onclick="closeModal()">CLOSE</button>
    </div>
</div>

<script>
    const _supabaseUrl = 'https://classmanager-api.sunilvasarkar1975.workers.dev';
    const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyendpam5sYm53amRsbHV2eHlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNTkzMDgsImV4cCI6MjA4NjgzNTMwOH0.H8c9tT5HsxeL4xJAM9KrKmb1v6KKO8dZ-NOB-Pz2G2k';
    const db = supabase.createClient(_supabaseUrl, _supabaseKey);

    let sessionInstID = "";
    let dataList = []; // Stores matching rows from 'list' table

    async function initSession() {
        const { data: { user } } = await db.auth.getUser();
        if (user) {
            const { data: prof } = await db.from('profiles').select('institute_id').eq('id', user.id).maybeSingle();
            if (prof) sessionInstID = prof.institute_id;
        }
    }
    initSession();

    // 1. FETCH DATA FROM LIST TABLE
    async function fetchAssignments() {
        const roll = document.getElementById('f-roll-input').value.trim().toUpperCase();
        if (!roll) return alert("Please enter Roll Number first.");
        if (!sessionInstID) await initSession();

        const { data: results, error } = await db.from('list')
            .select('*').eq('roll_number', roll).eq('institute_id', sessionInstID);

        if (error || !results || results.length === 0) return alert("No assignments found for this roll number.");

        dataList = results;
        
        // Populate all 4 Dropdowns
        const rollD = document.getElementById('f-roll-dropdown');
        const stuD = document.getElementById('f-student-name');
        const tidD = document.getElementById('f-teacher-id');
        const tnameD = document.getElementById('f-teacher-name');

        rollD.innerHTML = ''; stuD.innerHTML = ''; tidD.innerHTML = ''; tnameD.innerHTML = '';
        rollD.style.display = 'block';

        dataList.forEach((item, index) => {
            const label = `${item.roll_number} (${item.course_name})`;
            rollD.innerHTML += `<option value="${index}">${label}</option>`;
            stuD.innerHTML += `<option value="${index}">${item.student_name}</option>`;
            tidD.innerHTML += `<option value="${index}">${item.teacher_id}</option>`;
            tnameD.innerHTML += `<option value="${index}">${item.teacher_name} (${item.course_name})</option>`;
        });

        syncUI(0);
        alert("Assignments loaded. You can switch subjects using the dropdowns.");
    }

    // 2. SYNC UI AND FETCH BATCH TIME
    async function syncUI(index) {
        document.getElementById('f-roll-dropdown').value = index;
        document.getElementById('f-student-name').value = index;
        document.getElementById('f-teacher-id').value = index;
        document.getElementById('f-teacher-name').value = index;

        const selectedRow = dataList[index];
        
        // Fetch official time from batches table
        const { data: batch } = await db.from('batches')
            .select('batch_time').eq('batch_name', selectedRow.batch_name)
            .eq('institute_id', sessionInstID).maybeSingle();

        document.getElementById('f-official-timing').innerText = batch ? batch.batch_time : "Time not found in Batches.";
    }

    // 3. GENERATE TIMETABLE GRID
    async function generateTimeTable() {
        const dateVal = document.getElementById('f-date').value;
        const officialTime = document.getElementById('f-official-timing').innerText;
        const prefTime = document.getElementById('f-time').value;
        const statusDiv = document.getElementById('preferred-slot-status');
        const index = document.getElementById('f-teacher-id').value;

        if (index === "") return alert("Please fetch and select an assignment first.");
        const tID = dataList[index].teacher_id;

        // Validation for Preferred Slot
        if (officialTime.includes(prefTime)) {
            statusDiv.innerText = "✅ THE PREFERRED SLOT IS AVAILABLE"; statusDiv.style.color = "green";
        } else {
            statusDiv.innerText = "❌ THE PREFERRED SLOT IS OUTSIDE BATCH HOURS"; statusDiv.style.color = "red";
        }

        const { data: bookings } = await db.from("class_bookings").select("*").eq("booking_date", dateVal).eq("institute_id", sessionInstID);

        const SLOTS = ["09:00 AM to 10:00 AM", "10:00 AM to 11:00 AM", "11:00 AM to 12:00 PM", "12:00 PM to 01:00 PM", "01:00 PM to 02:00 PM", "02:00 PM to 03:00 PM", "03:00 PM to 04:00 PM", "04:00 PM to 05:00 PM", "05:00 PM to 06:00 PM", "06:00 PM to 07:00 PM", "07:00 PM to 08:00 PM", "08:00 PM to 09:00 PM"];
        const DAYS = ["MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY", "SUNDAY"];
        const tbody = document.getElementById('timetable-body');
        tbody.innerHTML = '';

        SLOTS.forEach(time => {
            const tr = document.createElement('tr');
            const tdTime = document.createElement('td'); tdTime.className = 'time-slot'; tdTime.innerText = time;
            tr.appendChild(tdTime);

            DAYS.forEach(day => {
                const td = document.createElement('td');
                const activeDay = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"][new Date(dateVal).getDay()];
                if (day !== activeDay) { td.style.opacity = "0.2"; td.style.pointerEvents = "none"; }

                const isBooked = bookings?.some(b => b.time_slot === time && b.day === day && b.teacher_id === tID);
                if (isBooked) {
                    td.className = 'booked-cell'; td.innerHTML = "BOOKED";
                    const bData = bookings.find(b => b.time_slot === time && b.teacher_id === tID);
                    if (bData) td.innerHTML += `<br><button style="background:red;color:#fff;border:none;padding:2px 5px;cursor:pointer;font-size:0.6rem;" onclick="deleteBooking('${bData.id}')">DELETE</button>`;
                } else {
                    td.innerHTML = `OPEN<br><button class="btn-book" onclick="bookSlot('${day}', '${time}')">BOOK</button>`;
                }
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
        document.getElementById('timetable-wrapper').style.display = 'block';
    }

    // 4. BOOK SLOT LOGIC
    async function bookSlot(day, time) {
        const index = document.getElementById('f-teacher-id').value;
        const dateVal = document.getElementById('f-date').value;
        const officialTime = document.getElementById('f-official-timing').innerText;
        const row = dataList[index];

        if (!officialTime.includes(time)) return alert("❌ DENIED: This time is not in the Teacher's Official Batch schedule.");

        const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
        if (dateVal !== tomorrow.toISOString().split('T')[0]) return alert("❌ Bookings only allowed for Tomorrow.");

        const { data: tData } = await db.from('teacher_details').select('mobile').eq('id', row.teacher_id).single();
        if (tData?.mobile) {
            const msg = `📚 Booking: ${row.student_name} (${row.roll_number}) for ${row.course_name} at ${time} on ${dateVal}.`;
            window.open(`https://wa.me/91${tData.mobile}?text=${encodeURIComponent(msg)}`, "_blank");
            if (!confirm("DID YOU SEND WHATSAPP TO " + row.teacher_name + "?")) return;
            window.open(`https://wa.me/91${tData.mobile}?text=${encodeURIComponent('⚠️ MISCHIEF: Clicked confirm but may not have sent message.')}`, "_blank");
        }

        const { error } = await db.from("class_bookings").insert({
            institute_id: sessionInstID, teacher_id: row.teacher_id, student_roll: row.roll_number,
            booking_date: dateVal, time_slot: time, day: day, course: row.course_name
        });

        if (error) alert(error.message);
        else {
            document.getElementById('confirmation-text').innerText = `Success! Booked with ${row.teacher_name} for ${row.course_name} at ${time}.`;
            document.getElementById('confirm-modal').style.display = 'flex';
            generateTimeTable();
        }
    }

    async function deleteBooking(id) {
        if (prompt("Security PIN:") === "1234") {
            await db.from('class_bookings').delete().eq('id', id);
            generateTimeTable();
        } else alert("Invalid PIN");
    }

    function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }

    window.onload = function() {
        const t = new Date(); t.setDate(t.getDate() + 1);
        document.getElementById('f-date').value = t.toISOString().split('T')[0];
    };
</script>
</body>
</html>
